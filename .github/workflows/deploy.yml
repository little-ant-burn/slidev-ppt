name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Slidev
        run: npm run build
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Export PDF
        run: npm run export:pdf
        
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: slidev-ppt-pdf
          path: slides-export.pdf
          retention-days: 30
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
      - name: Copy PDF to dist
        run: cp slides-export.pdf dist/slides-export.pdf
        
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
  release-pdf:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: slidev-ppt-pdf
          
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: pdf-latest
          name: Latest PDF Export
          body: |
            自动生成于 ${{ github.event.head_commit.timestamp }}
            提交: ${{ github.event.head_commit.message }}
          files: slides-export.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
